name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The workspace permission tests spawn real `deno` subprocesses, so the
      # runner needs Deno on PATH. Pinned to the version the suite is validated
      # against locally; bump deliberately after re-validating.
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v1.42.4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          python -m pytest tests/ -v

  ui-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run UI tests
        working-directory: web
        run: npm test
